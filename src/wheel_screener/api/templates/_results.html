<article>
  <header>
    <strong>{{ (job.result or [])|length }} candidate(s)</strong>
    {% if job.status == "cancelled" %} <mark>cancelled — partial</mark>{% endif %}
  </header>
  {% if job.result %}
  <figure>
    <table>
      <thead>
        <tr>
          <th>#</th><th>Symbol</th><th>Strike</th><th>Exp</th><th>DTE</th><th>Δ</th><th>IV</th>
          <th>Bid</th><th>Mid</th><th>OI</th><th>Yield</th><th>Fund.</th><th>Score</th>
        </tr>
      </thead>
      <tbody>
        {% for c in job.result %}
        {% set k = c.contract %}
        <tr>
          <td>{{ loop.index }}</td>
          <td><strong>{{ c.symbol }}</strong></td>
          <td>{{ k.strike }}</td>
          <td>{{ k.expiration }}</td>
          <td>{{ k.dte }}</td>
          <td>{{ "%.2f"|format(k.delta) if k.delta is not none else "" }}</td>
          <td>{{ "%.0f%%"|format(k.implied_volatility * 100) if k.implied_volatility is not none else "" }}</td>
          <td>{{ k.bid }}</td>
          <td>{{ k.mid }}</td>
          <td>{{ k.open_interest }}</td>
          <td>{{ "%.1f%%"|format(c.annualized_yield * 100) if c.annualized_yield is not none else "" }}</td>
          <td>{{ "%.2f"|format(c.fundamental_score) if c.fundamental_score is not none else "" }}</td>
          <td>{{ "%.2f"|format(c.score) if c.score is not none else "" }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </figure>
  {% else %}
  <p>No candidates matched. Try a higher max-DTE, a lower min-yield, or more names.</p>
  {% endif %}
</article>
