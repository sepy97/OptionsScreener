{% extends "base.html" %}
{% block content %}
  <article>
    <h2>Search a ticker</h2>
    <form hx-post="/search" hx-target="#search-results" hx-swap="innerHTML"
          hx-disabled-elt="find button">
      <div class="grid">
        <label>Ticker
          <input type="text" name="ticker" placeholder="e.g. AAPL" required autocomplete="off"
                 oninput="this.value=this.value.toUpperCase()">
          <small>any optionable symbol — the top puts nearest −0.20Δ across expiries</small>
        </label>
        <label>How many puts
          <input type="number" name="top_n" value="5" min="1" max="25">
        </label>
      </div>
      <div class="grid">
        <div>
          <label for="s_min_dte">Days to expiration (DTE)</label>
          <fieldset role="group">
            <input type="number" id="s_min_dte" name="min_dte" value="7" min="1" max="400"
                   aria-label="Minimum DTE">
            <input type="number" name="max_dte" value="45" min="1" max="400"
                   aria-label="Maximum DTE">
          </fieldset>
          <small>expiry window to scan — wider spans more expiries</small>
        </div>
        <label>Target delta
          <input type="number" name="target_delta" value="0.20" min="0.01" max="1" step="0.01">
          <small>put delta magnitude — 0.20 ≈ 20% assignment odds</small>
        </label>
      </div>
      <button type="submit" class="run-btn">Find CSPs</button>
    </form>
    <div id="search-results"></div>
  </article>
{% endblock %}
