<form hx-post="/runs" hx-target="#run" hx-swap="innerHTML" hx-disabled-elt="find button">
  <div class="grid">
    <div>
      <label for="min_dte">Days to expiration (DTE)</label>
      <fieldset role="group">
        <input type="number" id="min_dte" name="min_dte" value="{{ defaults.min_dte }}"
               min="1" max="400" aria-label="Minimum DTE">
        <input type="number" name="max_dte" value="{{ defaults.max_dte }}"
               min="1" max="400" aria-label="Maximum DTE">
      </fieldset>
      <small>e.g. 21–35 days — the expiry window to sell into</small>
    </div>
    <fieldset class="rank-by">
      <legend>Rank by</legend>
      <div class="segmented">
        <input type="radio" name="fundamental_weight" value="0" id="rank-yield"
               {% if defaults.fundamental_weight == 0 %}checked{% endif %}>
        <label for="rank-yield">Higher yield<small>most premium</small></label>
        <input type="radio" name="fundamental_weight" value="0.5" id="rank-bal"
               {% if defaults.fundamental_weight == 0.5 %}checked{% endif %}>
        <label for="rank-bal">Balanced<small>premium + quality</small></label>
        <input type="radio" name="fundamental_weight" value="1" id="rank-qual"
               {% if defaults.fundamental_weight == 1 %}checked{% endif %}>
        <label for="rank-qual">Better quality<small>safer to own</small></label>
      </div>
    </fieldset>
  </div>
  <details class="advanced">
    <summary>Advanced filters</summary>
    <div class="grid">
      <label>Names to check
        <input type="number" name="top_n" value="{{ defaults.top_n }}" min="1" max="500">
        <small>more = broader but slower (the chain pull is rate-limited)</small>
      </label>
      <label>Min yield
        <input type="number" name="min_yield" step="0.01" min="0" value="{{ defaults.min_yield }}">
        <small>annualized floor — 0.10 = 10% / yr (blank = no floor)</small>
      </label>
    </div>
    <div class="grid">
      <label>Min avg $-volume/day
        <input type="text" inputmode="numeric" name="min_dollar_volume"
               value="{{ defaults.min_dollar_volume|usd }}"
               onchange="this.value=(+this.value.replace(/,/g,'')||0).toLocaleString('en-US')">
        <small>US$ traded per day — skips stocks too thin to have tradeable options</small>
      </label>
      <label>Timeout (s) <input type="number" name="timeout_seconds" placeholder="(none)"></label>
    </div>
    <hr>
    <div class="grid">
      <div>
        <label for="min_price">Underlying price range ($)</label>
        <fieldset role="group">
          <input type="number" id="min_price" name="min_price" value="{{ defaults.min_price }}"
                 min="0" step="1" aria-label="Minimum underlying price">
          <input type="number" name="max_price" value="{{ defaults.max_price }}"
                 min="0" step="1" aria-label="Maximum underlying price">
        </fieldset>
        <small>only screen names trading in this band</small>
      </div>
      <div>
        <label for="target_delta">Put delta — target / max</label>
        <fieldset role="group">
          <input type="number" id="target_delta" name="target_delta"
                 value="{{ defaults.target_delta }}" min="0.01" max="1" step="0.01"
                 aria-label="Target delta">
          <input type="number" name="max_abs_delta" value="{{ defaults.max_abs_delta }}"
                 min="0.01" max="1" step="0.01" aria-label="Max absolute delta">
        </fieldset>
        <small>0.20 ≈ 20% assignment odds; max caps how deep to allow</small>
      </div>
    </div>
    <div class="grid">
      <label>Min open interest
        <input type="number" name="min_open_interest" value="{{ defaults.min_open_interest }}" min="0">
        <small>contract liquidity floor</small>
      </label>
      <label>Max bid-ask spread
        <input type="number" name="max_spread_pct" value="{{ defaults.max_spread_pct }}"
               min="0.01" max="1" step="0.01">
        <small>0.10 = 10% of mid — wider allows looser fills</small>
      </label>
      <label>Min IV
        <input type="number" name="min_iv" value="{{ defaults.min_iv or '' }}"
               min="0" step="0.05" placeholder="(off)">
        <small>optional — 0.40 = 40% implied-vol floor</small>
      </label>
    </div>
  </details>
  <button type="submit" class="run-btn">Run screen</button>
</form>
