<article hx-get="/runs/{{ job.job_id }}/progress" hx-trigger="every 2s" hx-swap="outerHTML" hx-target="this">
  <header>
    <strong aria-busy="true">Screening…</strong>
    <button hx-post="/runs/{{ job.job_id }}/cancel" hx-target="#run" hx-swap="innerHTML"
            class="secondary outline">Cancel</button>
  </header>
  <ul>
    {% for line in job.progress %}<li>{{ line }}</li>{% endfor %}
    {% if not job.progress %}<li>starting…</li>{% endif %}
  </ul>
</article>
