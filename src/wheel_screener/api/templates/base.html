{% import "_icons.html" as icon %}<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wheel Screener</title>
  <link rel="stylesheet" href="/static/pico.min.css">
  <link rel="stylesheet" href="/static/custom.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
<header class="app-header">
  <div class="container app-header__inner">
    <span class="brand">{{ icon.logo() }} Wheel&nbsp;Screener</span>
    <span class="brand-sub">CSP / wheel candidate screener — a shortlist to verify, not signals</span>
  </div>
</header>
<nav class="app-nav" aria-label="Primary">
  <div class="container app-nav__inner">
    <a href="/" class="nav-tab{{ ' active' if active_tab == 'screener' else '' }}"
       {% if active_tab == 'screener' %}aria-current="page"{% endif %}>Screener</a>
    <a href="/search" class="nav-tab{{ ' active' if active_tab == 'search' else '' }}"
       {% if active_tab == 'search' %}aria-current="page"{% endif %}>Search a ticker</a>
  </div>
</nav>
<main class="container">
  {% block content %}{% endblock %}
  <footer><small>Not investment advice · prices may be delayed · for research only.</small></footer>
</main>
</body>
</html>
